<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake - Captura el Territorio</title>
<link rel="stylesheet" href="styles.css" />
<link rel="manifest" href="manifest.json">
</head>
<body>

<section id="coverScreen" class="screen active">
<img src="assets/main-cover.png" class="cover-img" />
<button id="startBtn" class="primary-btn">INICIAR JUEGO</button>
</section>

<section id="menuScreen" class="screen">
<img src="assets/menu.png" class="menu-img" />

</section>

<section id="gameScreen" class="screen">
<canvas id="gameCanvas"></canvas>

<div id="hud">
<div id="progressBar"></div>
<div id="abilityIcon" class="hidden">🔥</div>
</div>

<div id="joystick"><div id="stick"></div></div>
</section>

<script src="game.js"></script>
</body>
</html>
